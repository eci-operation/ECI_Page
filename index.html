<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECI - System Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #F8F8F8; }
        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe id="mainFrame" title="ECI System Management"></iframe>
    </div>

    <script>
        const SOURCE_URL = 'https://eci-operation.github.io/ECI_Page/';

        fetch(SOURCE_URL)
            .then(res => res.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                // 1. Hapus footer navigasi (HOME, NATURE, CATALOG, CONTACT)
                const bottomNav = doc.querySelector('[data-purpose="bottom-nav"]');
                if (bottomNav) bottomNav.remove();

                // 2. Judul "System Management" jadi 1 baris di tengah (hapus <br/>)
                const h1 = doc.querySelector('h1');
                if (h1) {
                    h1.innerHTML = 'System Management';
                    h1.style.textAlign = 'center';
                }

                // 3. Kurangi padding bawah main karena nav sudah dihapus
                const mainContent = doc.querySelector('main');
                if (mainContent) {
                    mainContent.style.paddingBottom = '2rem';
                }

                // 4. Tambahkan <base> tag agar resource (CSS, gambar) tetap berfungsi
                const baseTag = doc.createElement('base');
                baseTag.href = SOURCE_URL;
                doc.head.insertBefore(baseTag, doc.head.firstChild);

                // 5. Inject script agar tombol tab bisa diklik (toggle active state)
                const tabScript = doc.createElement('script');
                tabScript.textContent = `
                    document.addEventListener('DOMContentLoaded', function() {
                        const nav = document.querySelector('[data-purpose="segmented-control"]');
                        if (!nav) return;
                        const buttons = nav.querySelectorAll('button');
                        buttons.forEach(function(btn) {
                            btn.addEventListener('click', function() {
                                // Hapus active state dari semua button
                                buttons.forEach(function(b) {
                                    b.classList.remove('bg-brandYellow', 'text-darkGrey');
                                    b.classList.add('text-gray-500');
                                });
                                // Set active state ke button yang diklik
                                btn.classList.add('bg-brandYellow', 'text-darkGrey');
                                btn.classList.remove('text-gray-500');
                            });
                        });
                    });
                `;
                doc.body.appendChild(tabScript);

                // Tampilkan di iframe menggunakan srcdoc
                document.getElementById('mainFrame').srcdoc = doc.documentElement.outerHTML;
            })
            .catch(() => {
                // Fallback jika CORS memblokir: tampilkan iframe biasa
                document.getElementById('mainFrame').src = SOURCE_URL;
            });
    </script>

</body>
</html>
